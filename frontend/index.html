<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <link rel="stylesheet" crossorigin href="/src/style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="sidebar-header">
        <h2>Чаты</h2>
        <button id="new-chat-btn" aria-label="Новый чат">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div id="chats-list"></div>
    </div>

    <div id="main">
      <header>
        <div class="header-content">
          <div class="header-icon">✦</div>
          <h1>AI Assistant</h1>
        </div>
      </header>

      <div id="chat" role="log" aria-label="Messages">
        <div class="welcome-message">
          <div class="welcome-icon">✦</div>
          <p>Я — ваш AI-ассистент. Задайте мне любой вопрос.</p>
        </div>
      </div>

      <div class="input-area">
        <form id="form">
          <div class="input-wrapper">
            <textarea
              id="input"
              rows="1"
              placeholder="Напишите сообщение..."
              autofocus
            ></textarea>
            <button type="submit" id="send-btn" aria-label="Отправить">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </form>
        <p class="disclaimer">Ответы могут быть неточными. Проверяйте важную информацию.</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
